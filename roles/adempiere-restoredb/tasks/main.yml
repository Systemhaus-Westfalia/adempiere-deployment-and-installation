---
# tasks file for roles/adempiere-restoredb
# All PostgreSQL operations run inside the container via docker exec, using Unix socket
# trust auth — no TCP password authentication required.

- name: "INFO: DB restore — configuration summary"
  ansible.builtin.debug:
    msg:
      - "source   : {{ restore_local_dir }}/{{ restore_backup_filename }}"
      - "dest     : {{ restore_remote_backup_dir }}/{{ restore_backup_filename }}"
      - "format   : {{ 'tar.gz' if restore_backup_filename.endswith('.tar.gz') else 'gz' }} | dump file: {{ restore_backup_filename[:-7] + '.sql' if restore_backup_filename.endswith('.tar.gz') else restore_backup_filename[:-3] }}"
      - "container: {{ pg_container }} | pg path: {{ restore_container_backup_dir }}"
      - "database : {{ adempiere_db }} | owner={{ adempiere_owner }} | superuser={{ pg_superuser }}"
      - "keep_restore_file: {{ keep_restore_file }}"

- name: Derive dump filename from backup filename
  ansible.builtin.set_fact:
    restore_dump_filename: >-
      {{
        restore_backup_filename[:-7] + '.sql'
        if restore_backup_filename.endswith('.tar.gz')
        else restore_backup_filename[:-3]
      }}

- name: "INFO: Copy backup file"
  ansible.builtin.debug:
    msg: "src={{ restore_local_dir }}/{{ restore_backup_filename }} | dest={{ restore_remote_backup_dir }}/{{ restore_backup_filename }}"

- name: Check if backup archive already exists on backend
  ansible.builtin.stat:
    path: "{{ restore_remote_backup_dir }}/{{ restore_backup_filename }}"
  register: archive_stat

- name: Copy backup file from control node to backend
  ansible.builtin.copy:
    src: "{{ restore_local_dir }}/{{ restore_backup_filename }}"
    dest: "{{ restore_remote_backup_dir }}/{{ restore_backup_filename }}"
    owner: "{{ adempiere_username }}"
    group: "{{ adempiere_username }}"
    mode: '0644'
  when: not archive_stat.stat.exists
  become: true

- name: "INFO: Decompress backup file"
  ansible.builtin.debug:
    msg: >-
      {{ 'tar -xzf' if restore_backup_filename.endswith('.tar.gz') else 'gzip -dk' }}
      {{ restore_remote_backup_dir }}/{{ restore_backup_filename }}
      | produces: {{ restore_remote_backup_dir }}/{{ restore_dump_filename }}

- name: Check if dump file already exists on backend
  ansible.builtin.stat:
    path: "{{ restore_remote_backup_dir }}/{{ restore_dump_filename }}"
  register: dump_stat

- name: Decompress backup file (tar.gz)
  ansible.builtin.command: >
    tar -xzf {{ restore_remote_backup_dir }}/{{ restore_backup_filename }}
    -C {{ restore_remote_backup_dir }}
  when:
    - not dump_stat.stat.exists
    - restore_backup_filename.endswith('.tar.gz')
  become: true

- name: Decompress backup file (gz)
  ansible.builtin.command: >
    gzip -dk {{ restore_remote_backup_dir }}/{{ restore_backup_filename }}
  when:
    - not dump_stat.stat.exists
    - not restore_backup_filename.endswith('.tar.gz')
  become: true

- name: Verify dump file exists after decompression
  ansible.builtin.stat:
    path: "{{ restore_remote_backup_dir }}/{{ restore_dump_filename }}"
  register: dump_verify

- name: Fail if dump file is missing
  ansible.builtin.fail:
    msg: "Dump file not found after decompression: {{ restore_remote_backup_dir }}/{{ restore_dump_filename }}"
  when: not dump_verify.stat.exists

- name: "INFO: Drop and recreate database"
  ansible.builtin.debug:
    msg: "DROP DATABASE IF EXISTS {{ adempiere_db }} | CREATE DATABASE {{ adempiere_db }} WITH OWNER {{ adempiere_owner }} | container={{ pg_container }}"

- name: Drop adempiere database
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - "{{ pg_container }}"
      - psql
      - -U
      - "{{ pg_superuser }}"
      - -d
      - postgres
      - -c
      - "DROP DATABASE IF EXISTS {{ adempiere_db }} WITH (FORCE);"
  become: true
  changed_when: true

- name: Create adempiere database
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - "{{ pg_container }}"
      - psql
      - -U
      - "{{ pg_superuser }}"
      - -d
      - postgres
      - -c
      - "CREATE DATABASE {{ adempiere_db }} WITH OWNER {{ adempiere_owner }};"
  become: true
  changed_when: true

- name: Set search_path on adempiere database
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - "{{ pg_container }}"
      - psql
      - -U
      - "{{ pg_superuser }}"
      - -d
      - postgres
      - -c
      - "ALTER DATABASE {{ adempiere_db }} SET search_path = {{ adempiere_db }}, public;"
  become: true
  changed_when: true

- name: "INFO: Ensure adempiere database user exists"
  ansible.builtin.debug:
    msg: "user={{ adempiere_owner }} | LOGIN,CREATEDB,NOSUPERUSER | container={{ pg_container }}"

- name: Create adempiere database user if not exists
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - "{{ pg_container }}"
      - psql
      - -U
      - "{{ pg_superuser }}"
      - -d
      - postgres
      - -c
      - "DO $$ BEGIN IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = '{{ adempiere_owner }}') THEN CREATE ROLE {{ adempiere_owner }} LOGIN CREATEDB NOSUPERUSER PASSWORD '{{ adempiere_db_password }}'; END IF; END $$;"
  become: true
  changed_when: false

- name: "INFO: Restore dump (destructive — overwrites existing data)"
  ansible.builtin.debug:
    msg: "db={{ adempiere_db }} | file={{ restore_container_backup_dir }}/{{ restore_dump_filename }} | container={{ pg_container }}"

- name: Restore SQL dump into adempiere database
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - "{{ pg_container }}"
      - psql
      - -U
      - "{{ pg_superuser }}"
      - -d
      - "{{ adempiere_db }}"
      - -f
      - "{{ restore_container_backup_dir }}/{{ restore_dump_filename }}"
  become: true
  changed_when: true

- name: "INFO: Post-restore SQL script"
  ansible.builtin.debug:
    msg: "src={{ post_restore_sql_local_dir }}/{{ post_restore_sql_filename }} | container file={{ restore_container_backup_dir }}/03-Misc-SQLs/{{ post_restore_sql_filename }} | db={{ adempiere_db }}"
  when: post_restore_sql_enabled | bool

- name: Ensure post-restore SQL script directory exists
  ansible.builtin.file:
    path: "{{ post_restore_sql_remote_dir }}"
    state: directory
    owner: "{{ adempiere_username }}"
    group: "{{ adempiere_username }}"
    mode: '0755'
  when: post_restore_sql_enabled | bool
  become: true

- name: Copy post-restore SQL script to backend
  ansible.builtin.copy:
    src: "{{ post_restore_sql_local_dir }}/{{ post_restore_sql_filename }}"
    dest: "{{ post_restore_sql_remote_dir }}/{{ post_restore_sql_filename }}"
    owner: "{{ adempiere_username }}"
    group: "{{ adempiere_username }}"
    mode: '0644'
  when: post_restore_sql_enabled | bool
  become: true

- name: Execute post-restore SQL script
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - "{{ pg_container }}"
      - psql
      - -U
      - "{{ pg_superuser }}"
      - -d
      - "{{ adempiere_db }}"
      - -f
      - "{{ restore_container_backup_dir }}/03-Misc-SQLs/{{ post_restore_sql_filename }}"
  become: true
  changed_when: true
  when: post_restore_sql_enabled | bool

- name: Remove post-restore SQL script from backend
  ansible.builtin.file:
    path: "{{ post_restore_sql_remote_dir }}/{{ post_restore_sql_filename }}"
    state: absent
  when: post_restore_sql_enabled | bool
  become: true

- name: "INFO: Clean up working files"
  ansible.builtin.debug:
    msg: "remove dump: {{ restore_remote_backup_dir }}/{{ restore_dump_filename }} | remove archive: {{ not keep_restore_file }}"

- name: Remove decompressed dump file
  ansible.builtin.file:
    path: "{{ restore_remote_backup_dir }}/{{ restore_dump_filename }}"
    state: absent
  become: true

- name: Remove backup archive
  ansible.builtin.file:
    path: "{{ restore_remote_backup_dir }}/{{ restore_backup_filename }}"
    state: absent
  when: not keep_restore_file
  become: true
