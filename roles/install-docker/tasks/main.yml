---
# tasks file for roles/install-docker
- name: Validate supported OS (Debian/Ubuntu)
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] == 'Debian'
      - ansible_facts['distribution'] in ['Debian', 'Ubuntu']
    fail_msg: "This role supports only Debian/Ubuntu. Detected: {{ ansible_facts['distribution'] }}"

- name: Set Docker repo base URL and GPG URL depending on distro
  ansible.builtin.set_fact:
    docker_repo_base: "https://download.docker.com/linux/{{ 'ubuntu' if ansible_facts['distribution'] == 'Ubuntu' else 'debian' }}"
    docker_gpg_url: "https://download.docker.com/linux/{{ 'ubuntu' if ansible_facts['distribution'] == 'Ubuntu' else 'debian' }}/gpg"
    docker_arch: >-
      {{
        'amd64' if ansible_facts['architecture'] == 'x86_64'
        else 'arm64' if ansible_facts['architecture'] in ['aarch64', 'arm64']
        else ansible_facts['architecture']
      }}

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes

- name: Ensure dependencies are installed
  ansible.builtin.package:
    name:
        - bc
        - curl
        - expect
        - git
        - ca-certificates
        - python3-debian
    state: present

- name: Create Docker GPG key directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Docker's official GPG key
  ansible.builtin.get_url:
    url: "{{ docker_gpg_url }}"
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add Docker repository to Apt sources
  ansible.builtin.deb822_repository:
    name: docker
    types: [deb]
    uris: "{{ docker_repo_base }}"
    # Corregimos los facts aquí
    suites: ["{{ ansible_facts['distribution_release'] }}"]
    components: [stable]
    signed_by: /etc/apt/keyrings/docker.asc
    # Docker espera 'amd64', Ansible dice 'x86_64'. Este filtro lo corrige:
    architectures: "{{ 'amd64' if ansible_facts['architecture'] == 'x86_64' else ansible_facts['architecture'] }}"
    state: present

- name: Update apt cache after adding Docker repository
  ansible.builtin.apt:
    update_cache: yes

- name: Find latest Docker 28.x version available in apt
  ansible.builtin.shell: >
    apt-cache madison docker-ce | grep ' 5:28\.' | head -1 | awk '{print $3}'
  register: docker_28_version
  changed_when: false

- name: Fail if no Docker 28.x package is available
  ansible.builtin.fail:
    msg: "No Docker 28.x package found in the configured apt repositories. Check that the Docker repo is reachable and the cache is up to date."
  when: docker_28_version.stdout | trim == ''

- name: Install Docker 28.x and Docker Compose
  ansible.builtin.package:
    name:
        - "docker-ce={{ docker_28_version.stdout | trim }}"
        - "docker-ce-cli={{ docker_28_version.stdout | trim }}"
        - containerd.io
        - docker-buildx-plugin
        - docker-compose-plugin
    state: present

- name: Hold Docker packages at 28.x to prevent automatic upgrade to 29+
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - docker-ce
    - docker-ce-cli

- name: Ensure Docker service is enabled and started
  ansible.builtin.service:
    name: docker
    state: started
    enabled: yes

- name: Create docke directory if it does not exist
  ansible.builtin.file:
    path: /docker
    state: directory
    mode: '0755'

- name: Ensure docker group exists
  ansible.builtin.group:
    name: docker
    state: present
