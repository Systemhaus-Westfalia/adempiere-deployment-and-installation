# Template for group_vars/all.yml
#
# HOW TO USE:
#   1. Copy this file:  cp group_vars/all_template.yml group_vars/all.yml
#   2. Fill in all values below (replace every placeholder)
#   3. Encrypt it:      ansible-vault encrypt group_vars/all.yml
#
# group_vars/all.yml is gitignored — never commit it with real values.

# ---------------------------------------------------------------------------
# Admin username — the non-root system user created on every server by serversconf.yml.
# All post-hardening playbooks (install-docker, deploy-adempiere, deploy-traefik, etc.)
# connect as this user on the custom SSH port.
#
# Personalisation: change this to any username you prefer (e.g. "deploy", "admin").
# The same name is used on BOTH BackEnd and FrontEnd servers.
# Default used by the project author: "westfalia"
# ---------------------------------------------------------------------------
adempiere_username: 'your-admin-username'

# Post-hardening login credentials for the admin user (used after serversconf.yml)
# These are the SSH password and sudo password for the adempiere_username account above.
adempiere_user_password: 'your-admin-user-password'
adempiere_user_become_pass: 'your-admin-sudo-password'

# Root password for initial server access (used by serversprep.yml and serversconf.yml)
root_user_password: 'your-root-password'

# Custom SSH port (set by serversconf.yml — must match what is already on the servers)
custom_sshport: 10099

# Path to the private SSH key used by all playbooks to connect to the servers.
# The keypair is generated by genkey.yml and lives inside the project under ssh_keys/.
# The private key is gitignored; the public key (adempiere_installation_key.pub) is tracked.
ansible_ssh_private_key_file: "{{ playbook_dir }}/ssh_keys/adempiere_installation_key"

# ---------------------------------------------------------------------------
# NOTE: Additional secrets are stored in encrypted role vars files.
# These files use a SEPARATE vault password: MyVaultPassword (default — change before going live).
#
# To view or edit them:
#   ansible-vault view  roles/serversconf/vars/main.yml      --ask-vault-pass
#   ansible-vault edit  roles/serversconf/vars/main.yml      --ask-vault-pass
#   ansible-vault rekey roles/serversconf/vars/main.yml      --ask-vault-pass   (to change the password)
#
# roles/serversconf/vars/main.yml         (password: MyVaultPassword)
#   username       : admin user to create on the servers (e.g. "westfalia")
#   your_password  : SHA-512 hashed password for that user — ⚠ CHANGE BEFORE PRODUCTION
#                    Generate with: mkpasswd --method=sha-512
#                    Then: ansible-vault edit roles/serversconf/vars/main.yml
#   user_path      : home directory base (e.g. /home)
#
# roles/deploy-adempiere/vars/main.yml    (password: MyVaultPassword)
#   postgres_password : PostgreSQL superuser password
#
# roles/deploy-traefik/vars/main.yml  (⚠ plaintext — see known-issues.md item 7)
#   cloudflare_tocken : Cloudflare API token for DNS-01 TLS challenge (note: variable name is misspelled)
#   cloudflare_email  : Email for Let's Encrypt registration
# ---------------------------------------------------------------------------
