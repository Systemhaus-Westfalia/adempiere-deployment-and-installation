- hosts: BackEnd
  become: true
  gather_facts: false

  pre_tasks:
    - name: Assign user for role
      ansible.builtin.set_fact:
        ansible_user: "{{ adempiere_username }}"
        # Esto hará que Ansible use las variables de tu Vault automáticamente
        ansible_password: "{{ adempiere_user_password }}"
        ansible_become_password: "{{ adempiere_user_become_pass }}"
        ansible_port: "{{ custom_sshport }}"
  roles:
    - deploy-adempiere
