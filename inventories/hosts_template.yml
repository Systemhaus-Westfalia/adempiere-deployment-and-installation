---
# Ansible inventory template.
#
# HOW TO USE:
#   cp inventories/hosts_template.yml inventories/hosts.yml
#   Fill in your real IP addresses.
#   inventories/hosts.yml is gitignored — never commit it.
#
# Group structure:
#   servers      — parent group; automatically includes all BackEnd and FrontEnd hosts.
#   BackEnd      — ADempiere application + database
#   FrontEnd     — Traefik reverse proxy
#   ansible_test — optional local lab VM for testing
#
# Each host is defined exactly once (under its specific group).
# To add a second BackEnd server: uncomment the backend2 block and set its IP.

all:
  children:

    servers:
      children:
        BackEnd:
          hosts:
            backend1:
              ansible_host: <backend_ip>    # e.g. 203.0.113.10
            # backend2:
            #   ansible_host: <second_backend_ip>   # e.g. 203.0.113.11
        FrontEnd:
          hosts:
            frontend:
              ansible_host: <frontend_ip>   # e.g. 203.0.113.20

    ansible_test:
      hosts:
        test:
          ansible_host: <test_ip>   # e.g. 10.10.0.5
